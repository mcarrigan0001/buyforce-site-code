<link rel="stylesheet" href="https://mcarrigan0001.github.io/buyforce-site-code/mainsite-home.css">
<div id="bf-home">Loading…</div>
<script>
(function(){
  var base = "https://mcarrigan0001.github.io/buyforce-site-code/";
  var bust = "?v=" + Date.now();
  fetch(base + "mainsite-home.body.html" + bust)
    .then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(function(html){
      document.getElementById("bf-home").innerHTML = html;
      var s = document.createElement("script");
      s.src = base + "mainsite-home.js" + bust;
      document.body.appendChild(s);
    })
    .catch(function(e){ console.error("BuyForce home load failed:", e); });
})();
</script>
